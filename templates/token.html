<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Your Token</title>
<style>
  body { 
    font-family: sans-serif; 
    max-width: 480px; 
    margin: 80px auto; 
    padding: 0 20px; 
    color: #222; 
  }
  h1 { 
    font-size: 1.2rem; 
  }
  p  { 
    color: #666; 
    font-size: 0.85rem; 
  }
  .box { 
    background: #f4f4f4; 
    border: 1px solid #ddd; 
    border-radius: 4px; 
    padding: 12px; 
    font-family: monospace; 
    font-size: 0.75rem; 
    word-break: break-all; 
    margin: 16px 0; 
  }
  input[type="text"] { 
    width: 100%; 
    padding: 8px; 
    border: 1px solid #ccc; 
    border-radius: 4px; 
    font-size: 0.85rem; 
    box-sizing: border-box; 
    margin-bottom: 10px; 
  }
  button { 
    padding: 8px 20px; 
    background: #222; 
    color: #fff; 
    border: none; 
    border-radius: 4px; 
    cursor: pointer; 
  }
  .err { 
    color: red; 
    font-size: 0.85rem; 
  }
</style>
</head>
<body>
<h1>Logged in as {{ username }} ({{ role }})</h1>
<div class="box">{{ token }}</div>

{% if error %}<p class="err">{{ error }}</p>{% endif %}

<form action="/enter-token" method="post">
  <input type="text" name="token" placeholder="Enter token" required />
  <button type="submit">Continue</button>
</form>
</body>
</html>
