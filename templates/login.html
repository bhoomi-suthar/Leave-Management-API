<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

<style>
  body {
     font-family: sans-serif; 
     background: #f5f5f5; 
     display: flex; 
     justify-content: center; 
     align-items: center; 
     height: 100vh; 
     margin: 0; 
    }
  .box { 
    background: #fff; 
    padding: 32px; 
    border-radius: 8px; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
    width: 100%; max-width: 360px; 
}
  h2 { 
    margin: 0 0 20px; 
    font-size: 1.3rem; 
    color: #222; 
}
  input { 
    width: 100%; 
    padding: 9px 12px; 
    margin-bottom: 12px; 
    border: 1px solid #ddd; 
    border-radius: 5px; 
    font-size: 0.88rem; 
    box-sizing: border-box; 
    outline: none; 
}
  input:focus { 
    border-color: #555; 
}
  button { 
    width: 100%; 
    padding: 10px; 
    background: #222; 
    color: #fff; border: none; 
    border-radius: 5px; 
    font-size: 0.9rem; 
    cursor: pointer; }
  button:hover { 
    background: #444; 
}
  .err { 
    color: #c0392b; 
    font-size: 0.82rem; 
    margin-bottom: 10px; 
}
  p { 
    margin-top: 16px; 
    font-size: 0.83rem; 
    color: #666; 
    text-align: center; 
}
  a { 
    color: #222; 
    }
</style>
</head>

<body>
<div class="box">
  <h2>Login Page</h2>

  {% if error %}<p class="err">{{ error }}</p>{% endif %}

  <form action="/login" method="post" onsubmit="preparePassword(); return true;">
    <input name="username" placeholder="Username" required />

    <!-- Visible password field - NO name so plaintext not sent -->
    <input id="realPassword" placeholder="Password" type="password" required />

    <!-- This sends encrypted password in payload as "password" -->
    <input type="hidden" id="encryptedPassword" name="password">

    <button type="submit">Login</button>
  </form>

  <p>Create an account <a href="/">Sign Up</a></p>
</div>

<script>
function preparePassword() {
    var real = document.getElementById("realPassword").value;
    if (!real) return;
    var encrypted = CryptoJS.SHA256(real).toString();
    document.getElementById("encryptedPassword").value = encrypted;
}
</script>

</body>
</html>
